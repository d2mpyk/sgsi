{% extends "auth/base_login.html" %}

{% block content %}
<form id="loginForm" class="auth-form-stack">
    <label class="auth-label" for="email">Correo o usuario</label>
    <p class="auth-field-wrap">
        <span class="auth-field-icon"><i class="fa fa-user-o"></i></span>
        <input id="email" class="w3-input w3-border w3-round-large auth-input" type="email" name="username"
            placeholder="usuario@empresa.com" required>
    </p>

    <label class="auth-label" for="password">Contraseña</label>
    <p class="auth-field-wrap">
        <span class="auth-field-icon"><i class="fa fa-lock"></i></span>
        <input id="password" class="w3-input w3-border w3-round-large auth-input" type="password" name="password"
            placeholder="Ingresa tu contraseña" required>
    </p>

    <div class="auth-inline-note">
        <span>Acceso protegido para usuarios autorizados.</span>
        <span class="w3-tag w3-round auth-chip">SGSI</span>
    </div>

    <p class="w3-margin-top">
        <button class="w3-button w3-block w3-round-large auth-primary-btn" type="submit">
            <strong>Ingresar al panel</strong>
        </button>
    </p>
</form>
<div class="w3-margin-top auth-links">
    <a href="{{ url_for('forgot_password') }}" class="auth-link-primary">
        ¿Olvidaste tu contraseña?
    </a>
    <a href="{{ url_for('resend_verification_view') }}" class="auth-link-secondary">
        ¿No recibiste el correo de activación?
    </a>
</div>
{% endblock %}

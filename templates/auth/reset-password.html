{% extends "auth/base_login.html" %}

{% set title = 'Restablecer Contraseña' %}

{% block content %}
<div class="w3-container w3-margin-bottom auth-helper-copy">
    <p>Ingresa tu nueva contraseña para recuperar el acceso.</p>
    <p id="matchError" class="w3-text-red" style="display: none;">Las contraseñas no coinciden.</p>
</div>

<form action="{{ url_for('reset_password', token=token) }}" method="POST" id="resetPasswordForm" class="auth-form-stack">
    <label class="auth-label" for="new_password">Nueva contraseña</label>
    <p class="auth-field-wrap">
        <span class="auth-field-icon"><i class="fa fa-lock"></i></span>
        <input id="new_password" name="new_password" class="w3-input w3-border w3-round-large auth-input" type="password"
            placeholder="Nueva contraseña" required minlength="8">
    </p>
    <label class="auth-label" for="confirm_password">Confirmar contraseña</label>
    <p class="auth-field-wrap">
        <span class="auth-field-icon"><i class="fa fa-check-circle-o"></i></span>
        <input id="confirm_password" name="confirm_password" class="w3-input w3-border w3-round-large auth-input" type="password"
            placeholder="Confirmar contraseña" required minlength="8">
    </p>

    <p>
        <button class="w3-button w3-block w3-round-large auth-primary-btn"
            type="submit"><strong>Cambiar contraseña</strong></button>
    </p>
</form>

<div class="w3-small w3-margin-top auth-links">
    <a href="{{ url_for('login') }}" class="auth-link-primary">Volver al inicio</a>
</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='js/theme.js') }}"></script>
<script src="{{ url_for('static', path='js/login.js') }}"></script>
{% endblock %}

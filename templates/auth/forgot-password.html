{% extends "auth/base_login.html" %}

{% set title = 'Recuperar Contraseña' %}

{% block content %}
<div id="form-container">
    <p class="auth-helper-copy">
        Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
    </p>
    <form id="forgotPasswordForm" action="{{ url_for('request_password_reset') }}" method="POST" class="auth-form-stack">
        <label class="auth-label" for="email">Correo electrónico</label>
        <p class="auth-field-wrap">
            <span class="auth-field-icon"><i class="fa fa-envelope-o"></i></span>
            <input id="email" class="w3-input w3-border w3-round-large auth-input" type="email" name="email"
                placeholder="usuario@empresa.com" required>
        </p>

        <p>
            <button class="w3-button w3-block w3-round-large auth-primary-btn"
                type="submit"><strong>Enviar enlace</strong></button>
        </p>
    </form>
</div>

<div class="w3-small w3-margin-top auth-links">
    <a href="{{ url_for('login') }}" class="auth-link-primary">Volver al inicio</a>
</div>
{% endblock %}

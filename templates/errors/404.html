<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "404" }}</title>
    <link rel="stylesheet" href="{{ request.app.state.google_fonts_url }}">
    <link rel="stylesheet"
        href="{{ request.app.state.fontawesome_url if request.app.state.fontawesome_url.startswith(('http://', 'https://', '//')) else (url_for('static', path=request.app.state.fontawesome_url.lstrip('/')) ~ '?v=' ~ request.app.state.static_asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/error-404.css') }}?v={{ request.app.state.static_asset_version }}">
</head>

<body>
    <main class="error-shell">
        <section class="error-card" aria-labelledby="error-title">
            <div class="error-media">
                <img src="{{ url_for('static', path='images/404.png') }}" alt="Ilustración de error 404">
            </div>
            <div class="error-copy">
                <p class="error-kicker">Ruta no disponible</p>
                <h1 id="error-title">Error 404</h1>
                <p class="error-description">
                    El contenido que intentas abrir no existe o fue movido dentro del portal SGSI.
                </p>
                <a class="error-action" href="{{ redirect_url }}">
                    <i class="fa fa-arrow-right" aria-hidden="true"></i>
                    <span>{{ button_text }}</span>
                </a>
            </div>
        </section>
    </main>
</body>

</html>

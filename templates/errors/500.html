<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "500" }}</title>
    <link rel="stylesheet" href="{{ request.app.state.google_fonts_url }}">
    <link rel="stylesheet" href="{{ request.app.state.fontawesome_url }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/error-404.css') }}">
</head>

<body>
    <main class="error-shell">
        <section class="error-card" aria-labelledby="error-title">
            <div class="error-media">
                <img src="{{ url_for('static', path='images/404.png') }}" alt="Ilustración de error interno">
            </div>
            <div class="error-copy">
                <p class="error-kicker">Fallo del sistema</p>
                <h1 id="error-title">{{ error_heading or "Error 500" }}</h1>
                <p class="error-description">
                    {{ error_description or "Ocurrió un fallo inesperado en el servidor. Intenta nuevamente en unos minutos." }}
                </p>
                <a class="error-action" href="{{ redirect_url }}">
                    <i class="fa fa-arrow-right" aria-hidden="true"></i>
                    <span>{{ button_text }}</span>
                </a>
            </div>
        </section>
    </main>
</body>

</html>
